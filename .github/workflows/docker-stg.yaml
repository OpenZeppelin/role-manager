name: Staging Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: string

concurrency:
  group: staging-deployment-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

