packages:
  # Include all packages in the packages directory
  - 'packages/*'
  # Include apps
  - 'apps/*'
  # Exclude any node_modules directories
  - '!**/node_modules/**'
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@openzeppelin/*'
  - 'vitest'
  - '@vitest/*'
overrides:
  # Security overrides — see PR adding these for full advisory list
  'axios@<1.16.0': ^1.16.0
  'hono@<4.12.21': ^4.12.21
  'protobufjs@<7.5.8': ^7.5.8
  '@protobufjs/utf8@<1.1.1': ^1.1.1
  'tmp@<0.2.6': ^0.2.6
  'lodash@<4.18.0': ^4.18.0
  'fast-uri@<=3.1.1': ^3.1.2
  '@metamask/sdk@<0.33.1': ^0.33.1
  '@metamask/sdk-communication-layer@<0.33.1': ^0.33.1
  'ip-address@<=10.1.0': ^10.1.1
  'ws@>=8.0.0 <8.20.1': ^8.20.1
allowBuilds:
  '@openzeppelin/adapter-stellar': true
  blake-hash: true
  bufferutil: true
  esbuild: true
  keccak: true
  protobufjs: true
  secp256k1: true
  tiny-secp256k1: true
  unrs-resolver: true
  usb: true
  utf-8-validate: true
onlyBuiltDependencies:
  - '@openzeppelin/adapter-stellar'
  - blake-hash
  - bufferutil
  - esbuild
  - keccak
  - protobufjs
  - secp256k1
  - tiny-secp256k1
  - unrs-resolver
  - usb
  - utf-8-validate
